<!DOCTYPE html>
<html>

<head>
<title>ANHEYACAD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6d9,#8ec5ff);
font-family:Segoe UI;
overflow:hidden;
}

/* floating icons */

.icon{
position:absolute;
font-size:22px;
animation:float 6s infinite linear;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

.main{
text-align:center;
background:white;
padding:50px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
font-size:40px;
font-weight:bold;
color:#ff4fa3;
}

.subtitle{
margin-top:10px;
color:#555;
}

.btn-start{
margin-top:25px;
background:#ff4fa3;
border:none;
padding:12px 30px;
border-radius:15px;
font-size:18px;
color:white;
}

.btn-start:hover{
background:#ff2e8a;
}

</style>
</head>

<body>

<!-- floating decorations -->

<div class="icon" style="left:10%;animation-delay:0s">❤️</div>
<div class="icon" style="left:25%;animation-delay:1s">🌙</div>
<div class="icon" style="left:40%;animation-delay:2s">✨</div>
<div class="icon" style="left:55%;animation-delay:3s">💙</div>
<div class="icon" style="left:70%;animation-delay:4s">⭐</div>

<div class="main">

<div class="logo">ANHEYACAD</div>

<p class="subtitle">Professional Resume & ATS Services</p>

<a href="/">

<button class="btn-start">
Start Now
</button>

</a>

</div>

</body>
</html>
