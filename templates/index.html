<!DOCTYPE html>
<html>

<head>

<title>ANHEYACAD Resume Services</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#ffb6d9,#8ec5ff);
font-family: "Segoe UI";
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card-box{
width:420px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.brand{
font-size:32px;
font-weight:bold;
color:#ff4fa3;
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

input{
border-radius:12px !important;
padding:10px;
}

.btn-register{
background:#ff4fa3;
border:none;
width:100%;
border-radius:12px;
font-weight:bold;
}

.btn-register:hover{
background:#ff2e8a;
}

.icons{
font-size:20px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card-box">

<div class="brand">ANHEYACAD</div>

<div class="icons">❤️ 🌙 ✨</div>

<p class="subtitle">Register for Resume Services</p>

<form method="POST">

<div class="mb-3">
<input type="text" name="name" class="form-control" placeholder="👤 Your Name" required>
</div>

<div class="mb-3">
<input type="text" name="phone" class="form-control" placeholder="📱 Phone Number" required>
</div>

<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="📧 Email Address" required>
</div>

<button class="btn btn-register">
Register
</button>

</form>

</div>

</body>

</html>
