
<!DOCTYPE html>
<html>

<head>

<title>Select Resume Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
font-family:Segoe UI;
}

.box{
max-width:600px;
margin:auto;
margin-top:100px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#message{
display:none;
}

</style>

</head>

<body>

<div class="box">

<h2 class="text-center mb-4">Select Resume Service</h2>

<form method="POST" onsubmit="prepareService()">

<div class="form-check">
<input class="form-check-input" type="checkbox" value="ATS Resume ₹599" id="ats">
<label class="form-check-label">ATS Resume ₹599</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Normal Resume ₹499" id="normal">
<label class="form-check-label">Normal Resume ₹499</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Cover Letter ₹299" id="cover">
<label class="form-check-label">Cover Letter ₹299</label>
</div>

<input type="hidden" name="service" id="serviceInput">

<br>

<button type="submit" class="btn btn-primary w-100">
Submit Selection
</button>

</form>

{% if message %}

<hr>

<div id="message" class="text-center" style="display:block">

<p class="text-success">
✅ Thank you! We will contact you shortly via WhatsApp.
</p>

<br>

<a id="waLink" href="#" target="_blank">
<button class="btn btn-success">
Contact on WhatsApp
</button>
</a>

<br><br>

<button class="btn btn-secondary" onclick="refreshPage()">
New Request
</button>

</div>

<script>

let message="{{message}}";

let wa="https://wa.me/918281495475?text="+encodeURIComponent(message);

document.getElementById("waLink").href=wa;

</script>

{% endif %}

</div>

<script>

function prepareService(){

let services=[];

if(document.getElementById("ats").checked)
services.push("ATS Resume ₹599");

if(document.getElementById("normal").checked)
services.push("Normal Resume ₹499");

if(document.getElementById("cover").checked)
services.push("Cover Letter ₹299");

if(services.length==0){
alert("Please select at least one service");
event.preventDefault();
return;
}

document.getElementById("serviceInput").value=services.join(", ");

}

function refreshPage(){
location.href="/services";
}

</script>

</body>

</html>
